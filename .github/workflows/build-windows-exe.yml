name: Build Windows EXE (OpenCut Desktop)

# Cómo usarlo:
# 1. Copia este archivo a tu repo en: .github/workflows/build-windows-exe.yml
#    (reemplaza al anterior si ya lo tenías)
# 2. Haz commit y push a GitHub.
# 3. En GitHub, ve a la pestaña "Actions" > "Build Windows EXE (OpenCut Desktop)" > "Run workflow".
# 4. Espera a que termine (unos 5-10 min la primera vez) y descarga el .exe
#    desde la sección "Artifacts" del resultado del workflow.
#
# Este workflow localiza automáticamente la carpeta donde está el Cargo.toml
# del workspace (el que contiene "[workspace]"), así que funciona tanto si
# subiste el código a la raíz del repo como si quedó dentro de una subcarpeta
# (p. ej. "OpenCut-0.3.0/").

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "**/apps/desktop/**"
      - "**/Cargo.toml"
      - "**/Cargo.lock"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust (stable, actualizado)
        uses: dtolnay/rust-toolchain@stable

      - name: Locate workspace root (carpeta con el Cargo.toml de [workspace])
        id: locate
        shell: bash
        run: |
          match=$(grep -rl '\[workspace\]' --include=Cargo.toml . | head -n1)
          if [ -z "$match" ]; then
            echo "No se encontró ningún Cargo.toml con [workspace] en el repo." >&2
            echo "Revisa que subiste el código fuente completo de OpenCut." >&2
            exit 1
          fi
          root=$(dirname "$match")
          echo "Workspace root encontrado en: $root"
          echo "root=$root" >> "$GITHUB_OUTPUT"

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ steps.locate.outputs.root }}/target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-cargo-

      - name: Build opencut-desktop (release)
        working-directory: ${{ steps.locate.outputs.root }}
        run: cargo build --release -p opencut-desktop

      - name: Rename binary with version tag
        shell: pwsh
        run: |
          $root = "${{ steps.locate.outputs.root }}"
          Copy-Item "$root/target/release/opencut.exe" "$root/target/release/OpenCut-windows.exe"

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenCut-windows-exe
          path: ${{ steps.locate.outputs.root }}/target/release/OpenCut-windows.exe
          retention-days: 30
